# =============================================================================
# E-Commerce Real-Time Data Platform — Docker Compose
#
# CORE (default):  Kafka + Postgres + Producers + Spark + Dashboard
# PROFILE cdc:     Debezium + Kafka Connect
# PROFILE airflow: Airflow scheduler + webserver
# PROFILE s3:      MinIO (optional S3-compatible storage)
# =============================================================================

x-common-env: &common-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ecommerce
  POSTGRES_USER: ecommerce_user
  POSTGRES_PASSWORD: ecommerce_pass
  POSTGRES_METRICS_DB: ecommerce
  POSTGRES_METRICS_SCHEMA: realtime
  DATA_LAKE_MODE: local
  DATA_LAKE_ROOT: /data-lake
  SPARK_MASTER: spark://spark-master:7077
  SPARK_CHECKPOINT_BASE: /data-lake/checkpoints
  SPARK_TRIGGER_INTERVAL: "30 seconds"
  SPARK_WATERMARK_DELAY: "10 minutes"
  PRODUCER_EVENTS_PER_SECOND: "15"
  LOG_LEVEL: INFO
  GLUE_SIMULATED: "true"
  REDSHIFT_SIMULATED: "true"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports: ["2181:2181"]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [data-platform]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks: [data-platform]
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 8

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka: {condition: service_healthy}
    volumes: ["./kafka/scripts:/scripts"]
    entrypoint: ["/bin/bash", "/scripts/create_topics.sh"]
    networks: [data-platform]

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: ecommerce_pass
      POSTGRES_DB: ecommerce
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=4", "-c", "max_wal_senders=4"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    networks: [data-platform]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user -d ecommerce"]
      interval: 5s
      retries: 12

  spark-master:
    image: bitnamilegacy/spark:3.5.3
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    ports: ["8080:8080", "7077:7077"]
    volumes:
      - .:/workspace
      - spark-checkpoints:/opt/spark/checkpoints
      - ./data/lake:/data-lake
    networks: [data-platform]

  spark-worker:
    image: bitnamilegacy/spark:3.5.3
    container_name: spark-worker
    depends_on: [spark-master]
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    volumes:
      - .:/workspace
      - spark-checkpoints:/opt/spark/checkpoints
      - ./data/lake:/data-lake
    networks: [data-platform]

  # Primary streaming job — auto-starts with core stack
  spark-streaming:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark
    container_name: spark-streaming
    depends_on:
      kafka-init: {condition: service_completed_successfully}
      spark-master: {condition: service_started}
      spark-worker: {condition: service_started}
      postgres: {condition: service_healthy}
    environment:
      <<: *common-env
      HOME: /tmp
      IVY_HOME: /tmp/.ivy2
    volumes:
      - .:/workspace
      - spark-checkpoints:/opt/spark/checkpoints
      - ./data/lake:/data-lake
    user: root
    entrypoint: ["/bin/bash", "/workspace/scripts/run_spark_streaming.sh"]
    networks: [data-platform]
    restart: unless-stopped

  producer:
    build:
      context: .
      dockerfile: docker/Dockerfile.producer
    container_name: event-producer
    depends_on:
      kafka-init: {condition: service_completed_successfully}
    environment:
      <<: *common-env
    volumes:
      - ./producers:/app/producers
      - ./configs:/app/configs
    networks: [data-platform]
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: dashboard
    depends_on:
      postgres: {condition: service_healthy}
    ports: ["8501:8501"]
    environment:
      <<: *common-env
      DASHBOARD_REFRESH_SECONDS: "5"
    volumes:
      - ./dashboard:/app/dashboard
      - ./configs:/app/configs
    networks: [data-platform]
    restart: unless-stopped

  # --- PROFILE: cdc (Debezium) ---
  kafka-connect:
    profiles: [cdc]
    image: debezium/connect:2.4
    container_name: kafka-connect
    depends_on:
      kafka: {condition: service_healthy}
      postgres: {condition: service_healthy}
    ports: ["8083:8083"]
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: ecommerce-connect
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    networks: [data-platform]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 10s
      retries: 12

  debezium-init:
    profiles: [cdc]
    image: curlimages/curl:8.5.0
    container_name: debezium-init
    depends_on:
      kafka-connect: {condition: service_healthy}
    volumes:
      - ./cdc/scripts:/scripts
      - ./cdc/connectors:/connectors
    entrypoint: ["/bin/sh", "/scripts/register_connector.sh"]
    networks: [data-platform]

  # --- PROFILE: airflow ---
  airflow-init:
    profiles: [airflow]
    build: {context: ., dockerfile: docker/Dockerfile.airflow}
    container_name: airflow-init
    depends_on:
      postgres: {condition: service_healthy}
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPDAvK4pWgDq8Z8x8x8x8x8x8x8x8x8x8x8="
    entrypoint: >
      /bin/bash -c "airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User
      --role Admin --email admin@example.com || true"
    networks: [data-platform]

  airflow-webserver:
    profiles: [airflow]
    build: {context: ., dockerfile: docker/Dockerfile.airflow}
    container_name: airflow-webserver
    depends_on:
      airflow-init: {condition: service_completed_successfully}
    ports: ["8088:8080"]
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPDAvK4pWgDq8Z8x8x8x8x8x8x8x8x8x8x8="
    command: webserver
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
    networks: [data-platform]

  airflow-scheduler:
    profiles: [airflow]
    build: {context: ., dockerfile: docker/Dockerfile.airflow}
    container_name: airflow-scheduler
    depends_on:
      airflow-init: {condition: service_completed_successfully}
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPDAvK4pWgDq8Z8x8x8x8x8x8x8x8x8x8x8="
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    networks: [data-platform]

  # --- PROFILE: s3 (MinIO — optional, use DATA_LAKE_MODE=s3) ---
  minio:
    profiles: [s3]
    image: minio/minio:latest
    container_name: minio
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes: [minio-data:/data]
    networks: [data-platform]

volumes:
  postgres-data:
  spark-checkpoints:
  minio-data:

networks:
  data-platform:
    driver: bridge
